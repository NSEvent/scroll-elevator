name: ScrollElevator
options:
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: 542GXYT5Z2
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "2"
    PRODUCT_NAME: Scroll Elevator
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    DEAD_CODE_STRIPPING: YES

targets:
  ScrollElevator:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ScrollElevator/ScrollElevator
        excludes:
          - "**/.DS_Store"
    resources:
      - path: ScrollElevator/ScrollElevator/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.kevintang.ScrollElevator
        PRODUCT_MODULE_NAME: ScrollElevator
        INFOPLIST_FILE: ScrollElevator/ScrollElevator/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ScrollElevator/ScrollElevator/Resources/ScrollElevator.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - sdk: ApplicationServices.framework
      - sdk: ServiceManagement.framework

  ScrollElevatorTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ScrollElevator/ScrollElevatorTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.kevintang.ScrollElevatorTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Scroll Elevator.app/Contents/MacOS/Scroll Elevator"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: ScrollElevator

schemes:
  ScrollElevator:
    build:
      targets:
        ScrollElevator: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ScrollElevatorTests
    archive:
      config: Release
